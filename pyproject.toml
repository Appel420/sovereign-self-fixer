[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "sovereign-self-fixer"
version = "0.2.0"
description = "Sovereign Self-Fixer with TPM 2.0 support, tamper detection, and recovery tooling"
authors = [{ name = "Derek Appel", email = "appel420@x.ai" }]
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "cryptography>=42.0.0",
]

[project.optional-dependencies]
dev = [
    "build",
    "pytest",
    "pytest-asyncio",
    "ruff",
    "mypy",
]

[tool.hatch.build.targets.wheel]
packages = ["selffixerai", "skills"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.mypy]
python_version = "3.12"
strict = true

[tool.pytest.ini_options]
asyncio_mode = "strict"
